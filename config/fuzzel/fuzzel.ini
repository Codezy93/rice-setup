# fuzzel — rice palette (warm near-black + pastel red)
# Mirrors preview-new/src/App.css and Waybar/AGS surfaces.

font=Victor Mono:size=11
dpi-aware=yes
prompt="❯ "
icon-theme=Adwaita
icons-enabled=yes
hide-before-typing=no
fields=name,generic,comment,categories,filename,keywords
terminal=kitty
launch-prefix=
list-executables-in-path=no
anchor=center
lines=10
width=42
horizontal-pad=18
vertical-pad=14
inner-pad=8
line-height=20
letter-spacing=0
layer=overlay
exit-on-keyboard-focus-loss=yes
tabs=4

[border]
width=1
radius=12

[colors]
# 0xRRGGBBAA — fuzzel uses 8-digit hex with the alpha at the end.

# Surface
background=14110Fee
border=F87171ff

# Plain entries
text=EDE6DCff
match=F87171ff           # part of an entry that matches the query

# Selected entry
selection=F87171ff       # selection background = pastel red
selection-text=0B0908ff  # text on selection = warm near-black
selection-match=FCA5A5ff # match within the selection (lighter red)

# Prompt + caret
prompt=F87171ff
placeholder=6B6359ff
input=EDE6DCff
counter=6B6359ff

[dmenu]
# When invoked with `fuzzel --dmenu` (clipboard, power menu, etc.)
exit-immediately-if-empty=no

[key-bindings]
# Vim-y nav alongside arrows
prev=Up Control+k Control+p
next=Down Control+j Control+n
page-up=Page_Up Control+u
page-down=Page_Down Control+d
first=Control+Home Control+g
last=Control+End Control+G
cursor-left=Left Control+b
cursor-right=Right Control+f
delete-line-backward=Control+w
execute=Return KP_Enter
cancel=Escape Control+c Control+\[
