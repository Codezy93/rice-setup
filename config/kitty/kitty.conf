# kitty — terminal config aligned with the rice palette
# Palette: warm near-black + pastel red (preview-new --accent: #F87171)

############
# FONT
############
font_family      Victor Mono
bold_font        Victor Mono Bold
italic_font      Victor Mono Italic
bold_italic_font Victor Mono Bold Italic
font_size        12.0
adjust_line_height  110%
disable_ligatures   never
text_composition_strategy platform

############
# WINDOW
############
remember_window_size  no
initial_window_width  1100
initial_window_height 680
window_padding_width  10
window_margin_width   0
hide_window_decorations yes
confirm_os_window_close 0
background_opacity  0.85
background_blur     1
dynamic_background_opacity yes

############
# CURSOR
############
cursor_shape        beam
cursor_beam_thickness 1.6
cursor_blink_interval 0.5
cursor_stop_blinking_after 5.0

############
# SCROLLBACK / MOUSE
############
scrollback_lines     20000
mouse_hide_wait      2.0
url_color            #FCA5A5
url_style            curly
copy_on_select       yes
strip_trailing_spaces smart

############
# BELL
############
enable_audio_bell    no
visual_bell_duration 0.0
window_alert_on_bell yes

############
# TABS
############
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
tab_title_template  "{index}: {title}"
active_tab_foreground   #EDE6DC
active_tab_background   #211C19
inactive_tab_foreground #6B6359
inactive_tab_background #14110F
tab_bar_background      #0B0908

############
# COLOURS — warm-dark + pastel red
############
foreground          #EDE6DC
background          #0B0908
selection_foreground #0B0908
selection_background #FCA5A5

# 16 ANSI — warmed near-black base, pastel-red and warm secondaries
# black
color0  #1A1614
color8  #3D3531
# red
color1  #F87171
color9  #FCA5A5
# green
color2  #86EFAC
color10 #BBF7D0
# yellow
color3  #FCD34D
color11 #FDE68A
# blue (intentionally dim — palette is red-led)
color4  #93B5C6
color12 #B9CFDA
# magenta
color5  #FB7185
color13 #FDA4AF
# cyan
color6  #BAE6FD
color14 #DBEAFE
# white
color7  #A8A096
color15 #EDE6DC

############
# SHELL
############
shell           .
editor          nvim
allow_remote_control yes

############
# KEYBINDS
############
clear_all_shortcuts no
map ctrl+shift+enter new_window
map ctrl+shift+t      new_tab
map ctrl+shift+q      close_tab
map ctrl+shift+right  next_tab
map ctrl+shift+left   previous_tab
map ctrl+shift+plus   change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0
map ctrl+shift+u      kitten unicode_input
