# ── Prefix ───────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Core settings ─────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Splits (open in current path) ────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize ───────────────────────────────────────────────────────────────
bind -r H resize-pane -L 4
bind -r J resize-pane -D 4
bind -r K resize-pane -U 4
bind -r L resize-pane -R 4

# ── Window navigation ─────────────────────────────────────────────────────────
bind -r [ previous-window
bind -r ] next-window
bind Tab last-window

# ── Copy mode (vi keys) ───────────────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind p run "wl-paste | tmux load-buffer - && tmux paste-buffer"

# ── Colour palette (matches project dark theme) ───────────────────────────────
# #0B0F14 bg-primary  #121821 surface  #263241 border
# #3A8DFF blue        #22C55E green    #F59E0B amber
# #EF4444 red         #22D3EE cyan     #E6EDF3 text

BG="#0B0F14"
SURFACE="#121821"
BORDER="#263241"
BLUE="#3A8DFF"
GREEN="#22C55E"
AMBER="#F59E0B"
TEXT="#E6EDF3"
MUTED="#6B7785"

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style          "fg=${BORDER}"
set -g pane-active-border-style   "fg=${BLUE}"

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=${SURFACE},fg=${TEXT}"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=${BLUE},fg=${BG},bold] #S #[bg=${SURFACE},fg=${BLUE}]"

# Right: user@host | date | time
set -g status-right-length 80
set -g status-right \
  "#[fg=${MUTED}] #[fg=${TEXT}]#{?client_prefix,#[fg=${AMBER}]⌨ ,}"\
  "#[fg=${MUTED}]  #[fg=${TEXT}]%a %d %b  "\
  "#[fg=${BLUE},bold]%H:%M "\
  "#[bg=${BLUE},fg=${BG}] #h "

# Window tabs
set -g window-status-style          "bg=${SURFACE},fg=${MUTED}"
set -g window-status-format         " #I:#W "
set -g window-status-current-style  "bg=${BG},fg=${BLUE},bold"
set -g window-status-current-format "#[fg=${SURFACE}]#[bg=${BG},fg=${BLUE},bold] #I:#W #[bg=${SURFACE},fg=${BG}]"
set -g window-status-activity-style "fg=${AMBER}"
set -g window-status-bell-style     "fg=${AMBER},bold"

# ── Message / command bar ─────────────────────────────────────────────────────
set -g message-style        "bg=${SURFACE},fg=${AMBER}"
set -g message-command-style "bg=${SURFACE},fg=${BLUE}"

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Bootstrap TPM on first run
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

run '~/.tmux/plugins/tpm/tpm'
