################
### MONITORS ###
################

# 1920x1080 @ 144Hz, no scaling
monitor = , 1920x1080@144, auto, 1


##################
### NVIDIA ENV ###
##################

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = GBM_BACKEND,nvidia-drm

# Wayland session
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_CURRENT_DESKTOP,Hyprland

# App-level Wayland support
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = CLUTTER_BACKEND,wayland

# Cursor
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24


######################
### AUTOSTART       ###
######################

exec-once = waybar
exec-once = ags run
exec-once = hyprpaper
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Export session environment for portals (screen share, file pickers)
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


######################
### GENERAL         ###
######################

# Palette: warm near-black + pastel red (matches preview --accent #F87171)
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(F87171ff)
    col.inactive_border = rgba(2A2521ff)
    layout = dwindle
    resize_on_border = true
}


######################
### DECORATION      ###
######################

decoration {
    rounding = 12

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 0.85
        popups = true
    }

    shadow {
        enabled = true
        range = 22
        render_power = 3
        color = rgba(00000099)
    }

    active_opacity = 1.0
    inactive_opacity = 0.96
    fullscreen_opacity = 1.0
}


######################
### ANIMATIONS      ###
######################

animations {
    enabled = true

    bezier = easeOutQuint,  0.23, 1,    0.32, 1
    bezier = easeInOutCubic,0.65, 0.05, 0.35, 1
    bezier = linear,        0,    0,    1,    1
    bezier = overshot,      0.05, 0.9,  0.1,  1.05

    animation = windows,     1, 4,  easeOutQuint,  slide
    animation = windowsOut,  1, 4,  easeInOutCubic,slide
    animation = border,      1, 6,  linear
    animation = borderangle, 1, 40, linear, loop
    animation = fade,        1, 4,  easeOutQuint
    animation = workspaces,  1, 3,  easeOutQuint,  slide
    animation = specialWorkspace, 1, 3, easeOutQuint, slidevert
}


######################
### CURSOR          ###
######################

cursor {
    # Required on NVIDIA — hardware cursors cause glitches on Wayland
    no_hardware_cursors = true
}


######################
### INPUT           ###
######################

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        scroll_factor = 0.5
    }
}


######################
### GESTURES        ###
######################

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.2
}


######################
### MISC            ###
######################

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 2                    # adaptive sync, fullscreen only
    focus_on_activate = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}


######################
### LAYOUT          ###
######################

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}


######################
### WORKSPACES      ###
######################

# Named workspaces from preview TopBar.
# `persistent:true` keeps each one alive even when empty, so Waybar's
# persistent-workspaces list always lines up with what Hyprland reports.
workspace = name:HQ,      persistent:true
workspace = name:STRIKE,  persistent:true
workspace = name:GRID,    persistent:true
workspace = name:COMMS,   persistent:true
workspace = name:ARCHIVE, persistent:true
workspace = name:FORGE,   persistent:true
workspace = name:OFFLOAD, persistent:true
workspace = name:RANGE,   persistent:true
workspace = name:DOSSIER, persistent:true
workspace = name:GHOST,   persistent:true


######################
### LAYER RULES     ###
######################

# Blur the bars and AGS panels for the glass look
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, ags
layerrule = ignorezero, ags


######################
### KEYBINDS        ###
######################

$mod  = SUPER
$term = kitty

# Core
bind = $mod, Return,    exec, $term
bind = $mod SHIFT, Q,   killactive
bind = $mod SHIFT, X,   exit
bind = $mod, M,         fullscreen, 0
bind = $mod SHIFT, M,   fullscreen, 1
bind = $mod, Space,     togglefloating
bind = $mod CTRL, P,    pseudo          # dwindle
bind = $mod CTRL, J,    togglesplit     # dwindle

# Launchers
bind = $mod, D,         exec, fuzzel
bind = $mod SHIFT, D,   exec, fuzzel --dmenu
bind = $mod SHIFT, S,   exec, grim -g "$(slurp)" - | wl-copy

# Apps (workspace assignment is handled by windowrulev2 below)
# ── GRID (3) ─── Browsers
bind = $mod, F,         exec, firefox
bind = $mod, B,         exec, flatpak run app.zen_browser.zen
# ── COMMS (4) ── Mail
bind = $mod, T,         exec, thunderbird
# ── DOSSIER (9) ── Files
bind = $mod, E,         exec, thunar
# ── STRIKE (2) ── Editor
bind = $mod, V,         exec, code
# ── ARCHIVE (5) ── Containers
bind = $mod, P,         exec, flatpak run io.podman_desktop.PodmanDesktop
# ── OFFLOAD (7) ── Vault / 2FA
bind = $mod, W,         exec, bitwarden
bind = $mod, A,         exec, ente-auth

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Move window
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize
binde = $mod CTRL, right, resizeactive, 30 0
binde = $mod CTRL, left,  resizeactive, -30 0
binde = $mod CTRL, up,    resizeactive, 0 -30
binde = $mod CTRL, down,  resizeactive, 0 30

# Workspaces (named — keys 1-0 map to HQ, STRIKE, GRID, …)
bind = $mod, 1, workspace, name:HQ
bind = $mod, 2, workspace, name:STRIKE
bind = $mod, 3, workspace, name:GRID
bind = $mod, 4, workspace, name:COMMS
bind = $mod, 5, workspace, name:ARCHIVE
bind = $mod, 6, workspace, name:FORGE
bind = $mod, 7, workspace, name:OFFLOAD
bind = $mod, 8, workspace, name:RANGE
bind = $mod, 9, workspace, name:DOSSIER
bind = $mod, 0, workspace, name:GHOST

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, name:HQ
bind = $mod SHIFT, 2, movetoworkspace, name:STRIKE
bind = $mod SHIFT, 3, movetoworkspace, name:GRID
bind = $mod SHIFT, 4, movetoworkspace, name:COMMS
bind = $mod SHIFT, 5, movetoworkspace, name:ARCHIVE
bind = $mod SHIFT, 6, movetoworkspace, name:FORGE
bind = $mod SHIFT, 7, movetoworkspace, name:OFFLOAD
bind = $mod SHIFT, 8, movetoworkspace, name:RANGE
bind = $mod SHIFT, 9, movetoworkspace, name:DOSSIER
bind = $mod SHIFT, 0, movetoworkspace, name:GHOST

# Scratchpad
bind = $mod, grave, togglespecialworkspace, magic
bind = $mod SHIFT, grave, movetoworkspace, special:magic

# AGS panel toggles (handled by widget names in ags/app.ts)
bind = $mod SHIFT, A,       exec, ags toggle sidebar
bind = $mod CTRL, A,        exec, ags toggle right-panel

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Media keys
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Clipboard history (SUPER+V is taken by VSCode — moved to SHIFT+V)
bind = $mod SHIFT, V,   exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy


######################
### WINDOW RULES    ###
######################

windowrulev2 = float,  class:(pavucontrol)
windowrulev2 = float,  class:(nm-connection-editor)
windowrulev2 = float,  class:(blueman-manager)
windowrulev2 = center, class:(pavucontrol)
windowrulev2 = size 700 500, class:(pavucontrol)

windowrulev2 = tile, class:(obsidian)

# ── App → workspace assignment (named workspaces) ──────────────────────────
# STRIKE — editor
windowrulev2 = workspace name:STRIKE, class:^(Code)$
windowrulev2 = workspace name:STRIKE, class:^(code-oss)$

# GRID — browsers
windowrulev2 = workspace name:GRID, class:^(firefox)$
windowrulev2 = workspace name:GRID, class:^(firefox-esr)$
windowrulev2 = workspace name:GRID, class:^(zen)$
windowrulev2 = workspace name:GRID, class:^(app\.zen_browser\.zen)$
windowrulev2 = workspace name:GRID, class:^(Google-chrome)$
windowrulev2 = workspace name:GRID, class:^(google-chrome)$

# COMMS — mail / chat
windowrulev2 = workspace name:COMMS, class:^(thunderbird)$
windowrulev2 = workspace name:COMMS, class:^(Mail)$
windowrulev2 = workspace name:COMMS, class:^(discord)$

# ARCHIVE — containers
windowrulev2 = workspace name:ARCHIVE, class:^(io\.podman_desktop\.PodmanDesktop)$
windowrulev2 = workspace name:ARCHIVE, class:^(Podman Desktop)$

# OFFLOAD — vault / 2FA
windowrulev2 = workspace name:OFFLOAD, class:^(Bitwarden)$
windowrulev2 = workspace name:OFFLOAD, class:^(bitwarden)$
windowrulev2 = workspace name:OFFLOAD, class:^(ente_auth)$
windowrulev2 = workspace name:OFFLOAD, class:^(io\.ente\.auth)$

# DOSSIER — files / notes
windowrulev2 = workspace name:DOSSIER, class:^(thunar)$
windowrulev2 = workspace name:DOSSIER, class:^(obsidian)$

# XWayland video bridge fix
windowrulev2 = opacity 0.0 override,class:^(xwaylandvideobridge)$
windowrulev2 = noanim,class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1,class:^(xwaylandvideobridge)$
windowrulev2 = noblur,class:^(xwaylandvideobridge)$
