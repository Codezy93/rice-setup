# hyprlock — lock screen (warm-dark + pastel-red palette)

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 5
    no_fade_in = false
}

background {
    monitor =
    path = ~/Pictures/wallpaper.jpg
    blur_passes = 3
    blur_size = 7
    brightness = 0.55
    contrast = 1.0
    noise = 0.02
    vibrancy = 0.18
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 320, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(F87171cc)
    inner_color = rgba(0B0908cc)
    font_color  = rgba(EDE6DCff)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(EDE6DCff)
    font_size = 72
    font_family = Victor Mono
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%A · %B %d"
    color = rgba(A8A096ff)
    font_size = 18
    font_family = Victor Mono
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = || बलिदान परमो धर्मः ||
    color = rgba(F87171cc)
    font_size = 16
    font_family = Noto Sans Devanagari
    position = 0, 40
    halign = center
    valign = bottom
}
